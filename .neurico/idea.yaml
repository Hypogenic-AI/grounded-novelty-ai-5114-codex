idea:
  title: Scientific Idea Generation with Grounded Novelty
  domain: artificial_intelligence
  hypothesis: 'Large language models can generate better scientific ideas when the
    notion of novelty is grounded through deduction, induction, proposal writing,
    outcome imagination, small experiments, or literature comparison, rather than
    relying on abstract or ungrounded novelty.

    '
  background:
    description: 'Recent papers have explored scientific idea generation, but LLMs
      are still widely believed not able to generate good ideas. This relates to the
      difficulty of defining novelty, with LLMs often criticized for generating either
      incremental or overly radical ideas. The hypothesis is that LLMs can handle
      the abstract notion of novelty better when grounded, such as through deduction,
      induction, writing proposals, imagining outcomes, running small experiments,
      or making comparisons in existing literature. The goal is to try these approaches
      and see if they improve idea generation.

      '
    papers:
    - description: '"Generating Literature-Driven Scientific Theories at Scale." https://arxiv.org/abs/2601.16282'
    - description: '"Heuristic-Based Ideation for Guiding LLMs Toward Structured Creativity."
        https://cichicago.substack.com/p/heuristic-based-ideation-for-guiding'
  metadata:
    author: Chenhao Tan
    source: IdeaHub
